name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh

      - name: Setup ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install \
            "WiFiManager@2.0.17" \
            "Adafruit NeoPixel@1.12.0" \
            "Adafruit PN532@1.3.0" \
            "GxEPD2@1.6.0" \
            "Adafruit GFX Library@1.11.0" \
            "ArduinoJson@7.0.0"

      - name: Compile firmware
        run: |
          mkdir -p build
          VERSION="${GITHUB_REF_NAME:-dev}"
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:PartitionScheme=min_spiffs \
            --output-dir build \
            --export-binaries \
            --build-property "build.extra_flags=-DFIRMWARE_VERSION=\"${VERSION}\" -DESP32" \
            ./jellybox-firmware

      - name: Check OTA partition fit
        run: |
          SIZE=$(stat -c '%s' build/jellybox-firmware.ino.bin)
          MAX=1966080
          PCT=$((SIZE * 100 / MAX))
          echo "Binary: $SIZE bytes ($PCT% of OTA partition)"
          if [ $SIZE -gt $MAX ]; then
            echo "::error::Binary ($SIZE bytes) exceeds OTA partition size ($MAX bytes)!"
            exit 1
          fi
          if [ $PCT -gt 85 ]; then
            echo "::warning::Binary is over 85% of OTA partition — consider a custom partition scheme"
          fi

      - name: Rename artifacts
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cd build
          for f in jellybox-firmware.ino.*; do
            suffix="${f#jellybox-firmware.ino.}"
            mv "$f" "jellybox-firmware-${VERSION}.${suffix}"
          done
          ls -la

      - name: Generate release manifest
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          BIN_FILE="build/jellybox-firmware-${VERSION}.bin"
          SHA256=$(sha256sum "$BIN_FILE" | awk '{print $1}')
          SIZE=$(stat -c '%s' "$BIN_FILE")
          
          cat > build/manifest.json <<EOF
          {
            "version": "${VERSION}",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/jellybox-firmware-${VERSION}.bin",
            "sha256": "${SHA256}",
            "size": ${SIZE},
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build/manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jellybox-firmware
          path: |
            build/*.bin
            build/*.elf
            build/manifest.json

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.bin
            build/*.elf
            build/manifest.json
          generate_release_notes: true

